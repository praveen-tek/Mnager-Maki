<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="../styles/newtab.css">
</head>
<body>

  <div class="wallpaper-container" id="wallpaperContainer"></div>

  <div class="content">

    <div class="header">
      <div class="filters" id="filters"></div>
      <div class="header-right">
        <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
      </div>
    </div>

    <div class="main">
      <div id="bookmarksList"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-text">No bookmarks yet</div>
        <button class="add-bookmark-btn" id="addBookmarkBtn">Add first bookmark</button>
      </div>
    </div>

    <button class="fab" id="addBtn" title="Add bookmark">+</button>

  </div>

  <!-- Add Bookmark Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Bookmark</h2>
        <button class="modal-close" id="closeAddModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">URL</label>
          <input type="text" class="form-input" id="urlInput" placeholder="https://example.com">
          <div class="form-error" id="urlError"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="titleInput" placeholder="Example">
          <div class="form-error" id="titleError"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Tags</label>
          <div id="tagList" class="tag-grid"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Group</label>
          <div id="groupList" class="tag-grid"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelAddBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBookmarkBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal modal-large">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="closeSettingsModal">✕</button>
      </div>
      <div class="modal-body">

        <div class="settings-section">
          <h3>Wallpaper</h3>
          <div class="wallpaper-options">
            <div class="wallpaper-preview" id="wallpaperPreview"></div>
            <div class="wallpaper-controls">
              <div class="form-group">
                <label class="form-label">Wallpaper URL</label>
                <div style="display:flex;gap:8px;">
                  <input type="text" class="form-input" id="wallpaperInput" placeholder="https://example.com/image.jpg" style="flex:1;">
                  <button class="btn btn-secondary" id="applyWallpaperBtn">Apply</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Or upload image</label>
                <input type="file" class="form-input" id="wallpaperUpload" accept="image/*">
              </div>
              <button class="btn btn-secondary" id="resetWallpaperBtn">Reset</button>
            </div>
          </div>
        </div>

        <div class="settings-section">
          <h3>Groups</h3>
          <div id="groupManager"></div>
          <div class="add-group-row" style="margin-top:10px;">
            <input type="text" class="form-input" id="newGroupInput" placeholder="New group name" style="flex:1;">
            <button class="btn btn-secondary" id="addGroupBtn">Add</button>
          </div>
        </div>

        <div class="settings-section">
          <h3>Bookmarks</h3>
          <div id="settingsBookmarksList"></div>
        </div>

        <!-- CUSTOMIZE SECTION -->
        <div class="settings-section">
          <h3>Customize</h3>

          <!-- Typography -->
          <div class="cust-sub-label">TYPOGRAPHY</div>

          <div class="cust-row">
            <label class="cust-label" for="custFontSize">FONT SIZE <span class="cust-val" id="custFontSizeVal">13px</span></label>
            <input type="range" class="cust-slider" id="custFontSize" min="10" max="18" step="1" value="13">
          </div>

          <div class="cust-row">
            <label class="cust-label">FONT COLOR</label>
            <div class="cust-color-row">
              <input type="color" class="cust-color-input" id="custFontColor" value="#ffffff">
              <button class="cust-swatch" data-color="#ffffff" style="background:#ffffff;" title="#ffffff"></button>
              <button class="cust-swatch" data-color="#f5f0e8" style="background:#f5f0e8;" title="Warm white"></button>
              <button class="cust-swatch" data-color="rgba(255,255,255,0.6)" style="background:rgba(255,255,255,0.6);" title="Muted"></button>
              <button class="cust-swatch" data-color="#f5c842" style="background:#f5c842;" title="Amber"></button>
              <button class="cust-swatch" data-color="#a8c5a0" style="background:#a8c5a0;" title="Soft green"></button>
              <button class="cust-swatch" data-color="#e8a0a0" style="background:#e8a0a0;" title="Soft red"></button>
            </div>
          </div>

          <div class="cust-row">
            <label class="cust-label">FONT WEIGHT</label>
            <div class="cust-toggle-group" id="custFontWeight">
              <button class="cust-toggle-btn" data-val="normal" id="custWeightRegular">REGULAR</button>
              <button class="cust-toggle-btn active" data-val="bold" id="custWeightBold">BOLD</button>
            </div>
          </div>

          <div class="cust-row">
            <label class="cust-label">TEXT TRANSFORM</label>
            <div class="cust-toggle-group" id="custTextTransform">
              <button class="cust-toggle-btn active" data-val="uppercase">UPPER</button>
              <button class="cust-toggle-btn" data-val="lowercase">LOWER</button>
              <button class="cust-toggle-btn" data-val="none">NONE</button>
            </div>
          </div>

          <div class="cust-row">
            <label class="cust-label" for="custSpacing">LETTER SPACING <span class="cust-val" id="custSpacingVal">0.2px</span></label>
            <input type="range" class="cust-slider" id="custSpacing" min="0" max="3" step="0.1" value="0.2">
          </div>

          <!-- Tags -->
          <div class="cust-sub-label" style="margin-top:18px;">TAGS</div>
          <div class="cust-tag-pills" id="custTagPills"></div>
          <div class="cust-add-tag-row">
            <input type="text" class="form-input" id="custNewTagInput" placeholder="New tag name" maxlength="20" style="flex:1;font-size:11px;padding:7px 10px;">
            <button class="btn btn-secondary" id="custAddTagBtn">Add</button>
          </div>
          <div class="form-error" id="custTagError"></div>

          <!-- Layout -->
          <div class="cust-sub-label" style="margin-top:18px;">LAYOUT</div>

          <div class="cust-row">
            <label class="cust-label">COLUMNS</label>
            <div class="cust-toggle-group" id="custColumns">
              <button class="cust-toggle-btn" data-val="2">2</button>
              <button class="cust-toggle-btn" data-val="3">3</button>
              <button class="cust-toggle-btn active" data-val="4">4</button>
            </div>
          </div>

          <div class="cust-row">
            <label class="cust-label">COMPACT MODE</label>
            <div class="cust-toggle-group" id="custCompact">
              <button class="cust-toggle-btn active" data-val="false">OFF</button>
              <button class="cust-toggle-btn" data-val="true">ON</button>
            </div>
          </div>

        </div>

        <div class="settings-section">
          <h3>Data</h3>
          <div class="data-controls">
            <button class="btn btn-secondary" id="exportBtn">Export Data</button>
            <button class="btn btn-secondary" id="importBtn">Import Data</button>
            <button class="btn btn-danger" id="clearBtn">Clear All Data</button>
          </div>
          <input type="file" id="importFile" accept=".json" style="display:none;">
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="closeSettingsBtn">Done</button>
      </div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/wallpaper.js"></script>
  <script src="../js/bookmarks.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/newtab.js"></script>

</body>
</html>
